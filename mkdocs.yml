site_name: Hydro-Resource-Hub
site_description: A comprehensive compilation of open-source software and tools for Water Resources Engineering.
site_author: Apurv Bharadiya

# Design and Theme Customisation
theme:
  name: material
  palette:
    # Light Mode
    - scheme: default
      primary: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark Mode
    - scheme: slate
      primary: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

# Tell MkDocs to use the main folder instead of a hidden 'docs' folder
docs_dir: .

# The Sidebar Navigation Layout (Titles wrapped in quotes to prevent colon errors)
nav:
  - '🏠 Home (Hub)': README.md
  - '🌊 HEC-RAS Master Guide':
    - 'Master Index': hydraulic_models/hec_ras_master_guide/00_index.md
    - 'Chapter 01: Introduction': hydraulic_models/hec_ras_master_guide/01_introduction.md
    - 'Chapter 02: Installation': hydraulic_models/hec_ras_master_guide/02_installation_setup.md
    - 'Chapter 03: Concepts': hydraulic_models/hec_ras_master_guide/03_fundamental_concepts.md
    - 'Chapter 04: Data Requirements': hydraulic_models/hec_ras_master_guide/04_data_requirements.md
    - 'Chapter 05: Interface': hydraulic_models/hec_ras_master_guide/05_interface_overview.md
    - 'Chapter 06: 1D Modelling': hydraulic_models/hec_ras_master_guide/06_1d_modeling.md
    - 'Chapter 07: 2D Modelling': hydraulic_models/hec_ras_master_guide/07_2d_modeling.md
    - 'Chapter 08: RAS Mapper': hydraulic_models/hec_ras_master_guide/08_ras_mapper.md
    - 'Chapter 09: Case Study': hydraulic_models/hec_ras_master_guide/09_case_study_rajkot.md
    - 'Chapter 10: Troubleshooting': hydraulic_models/hec_ras_master_guide/10_troubleshooting.md
    - 'Chapter 11: Pro Tips': hydraulic_models/hec_ras_master_guide/11_pro_tips.md
    - 'Chapter 12: Integrations': hydraulic_models/hec_ras_master_guide/12_integrations.md
    - 'Chapter 13: GitHub': hydraulic_models/hec_ras_master_guide/13_github_practices.md
    - 'Chapter 14: Conclusion': hydraulic_models/hec_ras_master_guide/14_conclusion.md
